<div class="sidebar-container">

  <div class="filter-card">
    <div class="section-title">Airlines</div>

    <div class="airline-list">
      @for (airline of airlines(); track airline) {
        <mat-checkbox
          [checked]="isSelected(airline)"
          (change)="toggleAirline(airline)">
          {{ airline }}
        </mat-checkbox>
      }
    </div>

  </div>

  <div class="filter-card">
    <div class="section-title">Departure Time</div>

    <div class="time-slots">
      <div class="time-chip">Morning</div>
      <div class="time-chip">Afternoon</div>
      <div class="time-chip">Evening</div>
    </div>
  </div>

</div>
